# Run via prek (uv run prek install). Local hooks reuse the project-pinned ruff —
# one version source (pyproject.toml), no remote-rev drift.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
